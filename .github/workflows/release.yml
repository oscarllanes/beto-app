

name: Build Backend

on:
  push:
    branches: [ main ]

jobs:
  build:
    # EL CAMBIO CRÍTICO: Usamos el runner ARM64 de GitHub
    runs-on: ubuntu-24.04-arm 
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Build
        run: |
          cd src-tauri
          cargo build --release
      
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: beto-app
          path: src-tauri/target/release/beto-app
